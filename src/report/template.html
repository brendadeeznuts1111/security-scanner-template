<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Security Report</title>
		<style>
			:root {
				--bg: #0f172a;
				--panel: #1e293b;
				--text: #e2e8f0;
				--muted: #94a3b8;
				{{THEME_VARS}}
			}
			body {
				font-family:
					system-ui,
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					Roboto,
					sans-serif;
				background: var(--bg);
				color: var(--text);
				margin: 0;
				padding: 2rem;
			}
			h1,
			h2 {
				margin-top: 0;
			}
			.meta {
				color: var(--muted);
				margin-bottom: 1.5rem;
			}
			.summary {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
				gap: 1rem;
				margin-bottom: 2rem;
			}
			.card {
				background: var(--panel);
				border-radius: 0.5rem;
				padding: 1rem;
				text-align: center;
			}
			.card .value {
				font-size: 2rem;
				font-weight: 700;
			}
			.card .label {
				color: var(--muted);
				font-size: 0.875rem;
			}
			.card.fatal .value {
				color: var(--fatal);
			}
			.card.warn .value {
				color: var(--warn);
			}
			.card.info .value {
				color: var(--info);
			}
			.card.ok .value {
				color: var(--ok);
			}
			table {
				width: 100%;
				border-collapse: collapse;
				background: var(--panel);
				border-radius: 0.5rem;
				overflow: hidden;
				margin-bottom: 2rem;
			}
			th,
			td {
				padding: 0.75rem 1rem;
				text-align: left;
				border-bottom: 1px solid #334155;
			}
			th {
				color: var(--muted);
				font-size: 0.875rem;
				font-weight: 600;
			}
			td.level {
				font-weight: 700;
				text-transform: uppercase;
				font-size: 0.75rem;
			}
			.level.fatal {
				color: var(--fatal);
			}
			.level.warn {
				color: var(--warn);
			}
			.level.info {
				color: var(--info);
			}
			.empty {
				text-align: center;
				padding: 3rem;
				color: var(--ok);
			}
			a {
				color: var(--info);
			}
			.visual-gallery {
				margin-bottom: 2rem;
			}
			.visual-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
				gap: 1rem;
			}
			.visual-item {
				margin: 0;
				background: var(--panel);
				border-radius: 0.5rem;
				overflow: hidden;
			}
			.visual-item img {
				display: block;
				width: 100%;
				height: auto;
				object-fit: cover;
			}
			.visual-item figcaption {
				padding: 0.5rem 0.75rem;
				color: var(--muted);
				font-size: 0.875rem;
			}
			.operator-qr {
				margin-bottom: 2rem;
				background: var(--panel);
				border-radius: 0.5rem;
				padding: 1.25rem;
				border: 1px solid #334155;
			}
			.operator-qr-warning {
				color: var(--warn);
				font-size: 0.875rem;
				margin-top: 0;
			}
			.operator-qr-figure {
				margin: 1rem 0 0;
				text-align: center;
			}
			.operator-qr-figure img {
				background: #fff;
				border-radius: 0.375rem;
				padding: 0.5rem;
			}
			.operator-qr-figure figcaption {
				color: var(--muted);
				font-size: 0.875rem;
				margin-top: 0.5rem;
			}
			.operator-qr-meta {
				color: var(--muted);
				font-size: 0.75rem;
				margin-bottom: 0;
			}
			.operator-qr-meta code {
				color: var(--text);
			}
		</style>
	</head>
	<body>
		<div id="summary">{{SUMMARY_HTML}}</div>
		<div class="meta">
			<div id="project"></div>
			<div id="generatedAt"></div>
			<div id="feedSource"></div>
			<div id="dryRun"></div>
		</div>

		<div class="summary">
			<div class="card fatal">
				<div class="value" id="fatalCount">0</div>
				<div class="label">Fatal</div>
			</div>
			<div class="card warn">
				<div class="value" id="warnCount">0</div>
				<div class="label">Warn</div>
			</div>
			<div class="card info">
				<div class="value" id="infoCount">0</div>
				<div class="label">Info</div>
			</div>
			<div class="card ok">
				<div class="value" id="riskScore">0</div>
				<div class="label">Risk Score</div>
			</div>
		</div>

		{{OPERATOR_QR}} {{VISUAL_GALLERY}}

		<h2>Advisories</h2>
		<table id="advisories">
			<thead>
				<tr>
					<th>Level</th>
					<th>Package</th>
					<th>Version</th>
					<th>Categories</th>
					<th>Description</th>
				</tr>
			</thead>
			<tbody id="advisoriesBody">
				{{ADVISORY_ROWS}}
			</tbody>
		</table>
		<div id="emptyState" class="empty" style="display: none">No advisories detected.</div>

		<h2>Policy Overrides</h2>
		<table id="overrides">
			<thead>
				<tr>
					<th>Action</th>
					<th>Target</th>
					<th>Reason</th>
				</tr>
			</thead>
			<tbody id="overridesBody">
				{{OVERRIDE_ROWS}}
			</tbody>
		</table>

		<script>
			const data = {{DATA}};

			document.getElementById('project').textContent = data.project ? 'Project: ' + data.project : '';
			document.getElementById('generatedAt').textContent = 'Generated at: ' + data.generatedAt;
			document.getElementById('feedSource').textContent = 'Feed source: ' + data.feedSource;
			document.getElementById('dryRun').textContent = data.dryRun ? 'Dry run — no installations were blocked.' : '';

			document.getElementById('fatalCount').textContent = data.fatalCount;
			document.getElementById('warnCount').textContent = data.warnCount;
			document.getElementById('infoCount').textContent = data.infoCount;
			document.getElementById('riskScore').textContent = data.riskScore;

			if (data.advisories.length === 0) {
				document.getElementById('advisories').style.display = 'none';
				document.getElementById('emptyState').style.display = 'block';
			}

			if (data.overrides.length === 0) {
				document.getElementById('overrides').style.display = 'none';
			}
		</script>
	</body>
</html>
