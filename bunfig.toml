[test]
root = "tests"
# Position-arg filters are substring matches (not globs). Glob slices: src/domain/test-layout.ts
# @see https://bun.com/docs/test/discovery#position-arguments-as-filters
# @see https://bun.com/docs/runtime/archive#filtering-with-glob-patterns

# Lifecycle hooks shared across all test files.
# @see https://bun.com/reference/bun/test
# @see https://bun.com/docs/test/lifecycle
preload = ["./tests/setup.ts"]

# Per-test timeout in ms (default 5000).
# CLI: `bun test --timeout <ms>` — @see https://bun.com/docs/guides/test/timeout
# Per-test override: `test("name", fn, 500)` — @see https://bun.com/docs/test/writing-tests#timeouts
timeout = 10000

# Selectively run independent tests in parallel.
# @see https://bun.com/reference/bun/test/Describe/serial
# @see https://bun.com/docs/guides/test/concurrent-test-glob
# Override everything: `bun test --concurrent`
concurrentTestGlob = [
	"**/concurrent-*.test.ts",
	"**/policy/*.test.ts",
	"**/crypto/*.test.ts",
	"**/markdown/*.test.ts",
]

# Prevent orphaned scanner processes when the parent exits (CI / daemon use).
[run]
no_orphans = true

# Optional: shared global virtual store for --linker=isolated (Bun >=1.3.14).
# Warm CI installs symlink from <cache>/links/ instead of clonefileat per file.
# [install]
# globalStore = true
