name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: full
            script: check
          - name: network
            script: test:network
          - name: intel
            script: test:intel
          - name: domain
            script: test:domain

    name: ${{ matrix.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run quality checks
        if: matrix.script == 'check'
        run: bun run lint && bun run typecheck && bun run test:junit

      - name: Upload JUnit report
        if: matrix.script == 'check'
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: test-results/junit.xml

      - name: Run test slice
        if: matrix.script != 'check'
        run: bun run lint && bun run typecheck && bun run ${{ matrix.script }}
